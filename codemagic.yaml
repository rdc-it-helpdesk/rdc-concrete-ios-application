workflows:
  ios-workflow:
    name: ios workflow
    max_build_duration: 60

    environment:
      flutter: stable

    integrations:
    app_store_connect: rdc-concrete-ios-application

    ios_signing:
      distribution_type: app_store
      bundle_identifier: com.vendorapp.rdcconcrete

    scripts:
      - flutter pub get
      - flutter build ipa --release --build-name=1.0.0 --build-number=12

    artifacts:
      - build/ios/ipa/*.ipa
